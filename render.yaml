services:
  # FastAPI Backend Service
  - type: web
    name: constructhire-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt --only-binary :all:"
    startCommand: "uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: constructhire-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.14.5

databases:
  # PostgreSQL Database Instance
  - name: constructhire-db
    plan: free
